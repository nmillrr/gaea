version: '3.8'

services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3
    container_name: cosmo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cosmo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cosmopassword}
      POSTGRES_DB: ${POSTGRES_DB:-cosmodb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for rate limiting and caching
  redis:
    image: redis:7.2-alpine
    container_name: cosmo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: cosmo-minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live || exit 0"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default bucket and set policies
  minio-setup:
    image: minio/mc:latest
    container_name: cosmo-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set cosmo-minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing cosmo-minio/${MINIO_BUCKET_NAME:-cosmo-uploads};
      mc policy set public cosmo-minio/${MINIO_BUCKET_NAME:-cosmo-uploads};
      exit 0;
      "

  # Backend Node.js API
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: cosmo-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules  # Do not bind-mount node_modules (use container's)
    environment:
      # Node environment
      NODE_ENV: development
      PORT: 4000
      
      # Database 
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-cosmo}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cosmopassword}
      DB_NAME: ${POSTGRES_DB:-cosmodb}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Storage
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MINIO_BUCKET_NAME:-cosmo-uploads}
      S3_USE_SSL: 'false'
      
      # Auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-1d}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      
    depends_on:
      postgres:
        condition: service_healthy
      redis: 
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    command: npm run dev

volumes:
  postgres-data:
  redis-data:
  minio-data: